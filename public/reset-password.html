<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - IUEA Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .btn-primary { background: #8B0000; transition: all 0.2s; }
        .btn-primary:hover { background: #6a0000; transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50">

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center">
            <div class="w-16 h-16 bg-[#8B0000] rounded-full flex items-center justify-center mx-auto">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h2 class="mt-4 text-2xl font-bold text-gray-800">Reset Password</h2>
            <p class="text-gray-500 text-sm mt-2">Create a new password for your account</p>
        </div>

        <div class="mt-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#8B0000] focus:border-[#8B0000]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#8B0000] focus:border-[#8B0000]">
            </div>
            
            <button id="resetPasswordBtn" class="w-full btn-primary text-white py-2 rounded-lg font-semibold mt-4">
                Reset Password
            </button>
            
            <div class="text-center mt-4">
                <a href="/voting.html" class="text-sm text-[#8B0000] hover:underline">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');

    // API base URL
    const API_BASE = '/api';

    // Show toast message
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-5 right-5 bg-white rounded-lg shadow-xl border-l-8 p-4 z-50`;
        toast.style.borderLeftColor = isError ? '#dc2626' : '#8B0000';
        toast.innerHTML = `
            <div class="flex items-center gap-3">
                <i class="fas ${isError ? 'fa-exclamation-triangle text-red-500' : 'fa-check-circle text-[#8B0000]'}"></i>
                <p class="text-sm">${message}</p>
                <button class="ml-auto text-gray-400" onclick="this.parentElement.parentElement.remove()">×</button>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    // Reset password function
    async function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!newPassword || !confirmPassword) {
            showToast('Please fill in all fields', true);
            return;
        }

        if (newPassword.length < 6) {
            showToast('Password must be at least 6 characters', true);
            return;
        }

        if (newPassword !== confirmPassword) {
            showToast('Passwords do not match', true);
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    token: token,
                    password: newPassword,
                    password_confirmation: confirmPassword
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || 'Failed to reset password');
            }

            showToast('Password reset successful! Redirecting to login...');
            
            setTimeout(() => {
                window.location.href = '/voting.html';
            }, 2000);

        } catch (error) {
            showToast(error.message, true);
        }
    }

    // Check if token and email exist
    if (!token || !email) {
        showToast('Invalid reset link. Please request a new one.', true);
        setTimeout(() => {
            window.location.href = '/voting.html';
        }, 2000);
    }

    // Add event listener
    document.getElementById('resetPasswordBtn').addEventListener('click', resetPassword);
    
    // Allow Enter key to submit
    document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            resetPassword();
        }
    });
    document.getElementById('newPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('confirmPassword').focus();
        }
    });
</script>

</body>
</html>
