<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IUEA Blockchain Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .bg-maroon { background-color: #8B0000; }
        .btn-maroon { background-color: #8B0000; transition: all 0.3s ease; }
        .btn-maroon:hover { background-color: #6a0000; transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Login Form -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-md p-8">
            <div class="text-center mb-8">
                <img src="images/iuea-logo.png" alt="IUEA Logo" class="h-24 mx-auto mb-4">
                <div class="flex justify-center mt-2">
                    <span class="bg-[#8B0000]/10 text-[#8B0000] text-xs px-3 py-1 rounded-full">
                        <i class="fas fa-link mr-1"></i> Blockchain Secured
                    </span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Admission Number</label>
                    <input type="text" id="loginVoterId" placeholder="e.g., IUEA-2025-1234" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000] focus:border-[#8B0000]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000] focus:border-[#8B0000]">
                </div>
                <div class="text-right">
                    <button id="forgotPasswordLink" type="button" class="text-sm text-[#8B0000] hover:underline">Forgot Password?</button>
                </div>
                <button id="loginBtn" class="w-full btn-maroon text-white py-2 rounded-lg font-semibold">Login</button>
                
                <div class="text-center mt-4">
                    <p class="text-sm text-gray-500">Don't have an account? <a href="register.html" class="text-[#8B0000] hover:underline">Register here</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="forgotPasswordModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 px-4">
        <div class="w-full max-w-md bg-white rounded-xl shadow-xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">Reset Password</h2>
                <button id="closeForgotModal" type="button" class="text-gray-500 hover:text-[#8B0000]"><i class="fas fa-times"></i></button>
            </div>
            <p class="text-sm text-gray-600 mb-4">Enter your email address and we'll send you a password reset link.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email address"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000] focus:border-[#8B0000]">
                </div>
                <button id="resetBtn" type="button" class="w-full btn-maroon text-white py-2 rounded-lg font-semibold">Send Reset Link</button>
                <div class="text-center">
                    <button id="cancelResetBtn" type="button" class="text-sm text-[#8B0000] hover:underline">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        emailjs.init("AKON5I-qdSpvPbsaj");

        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('hidden');
            document.getElementById('resetEmail').focus();
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('hidden');
        }

        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                alert('Please enter your email address');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Email not found');
                }

                let voterName = email.split('@')[0];
                let admissionNumber = 'Not found';

                if (data.voter_name) {
                    voterName = data.voter_name;
                }
                if (data.admission_number) {
                    admissionNumber = data.admission_number;
                }

                const templateParams = {
                    to_name: voterName,
                    to_email: email,
                    admission_number: admissionNumber,
                    reset_link: data.reset_link,
                    message: 'Click the button above to reset your password. This link expires in 1 hour.'
                };

                console.log('Sending email with params:', templateParams);

                const emailResult = await emailjs.send('service_uixgfye', 'password_reset', templateParams);
                console.log('Email sent:', emailResult);

                alert('Password reset link sent to your email!');
                closeForgotPasswordModal();
            } catch (error) {
                console.error('Error:', error);
                alert(error.message);
            }
        }
        
        async function login() {
            const voter_id = document.getElementById('loginVoterId').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!voter_id || !password) {
                alert('Please enter both admission number and password');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voter_id, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials');
                }
                
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('voter_name', data.voter.full_name);
                localStorage.setItem('voter_id', data.voter.voter_id);
                localStorage.setItem('voter_email', data.voter.email);
                
                window.location.href = 'about.html';
                
            } catch (error) {
                alert(error.message);
            }
        }
        
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('forgotPasswordLink').addEventListener('click', openForgotPasswordModal);
        document.getElementById('resetBtn').addEventListener('click', sendResetLink);
        document.getElementById('closeForgotModal').addEventListener('click', closeForgotPasswordModal);
        document.getElementById('cancelResetBtn').addEventListener('click', closeForgotPasswordModal);
        document.getElementById('resetEmail').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendResetLink();
            }
        });
        
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'about.html';
        }
    </script>
</body>
</html>
