<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IUEA Blockchain Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .bg-maroon { background-color: #8B0000; }
        .btn-maroon { background-color: #8B0000; transition: all 0.3s ease; }
        .btn-maroon:hover { background-color: #6a0000; transform: scale(0.98); }
    </style>
</head>

<body class="bg-gray-50">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#8B0000] rounded-full flex items-center justify-center">
                        <i class="fas fa-university text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">IUEA <span class="text-[#8B0000]">VoteHub</span></h1>
                        <p class="text-xs text-gray-500">Blockchain Voting System</p>
                    </div>
                </div>
                <div class="flex gap-6 items-center">
                    <a href="about.html" class="text-gray-600 hover:text-[#8B0000] transition">About</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-md p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-[#8B0000] rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-university text-white text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
                <p class="text-gray-500 text-sm mt-1">Login to access your voting dashboard</p>
                <div class="flex justify-center mt-3">
                    <span class="bg-[#8B0000]/10 text-[#8B0000] text-xs px-3 py-1 rounded-full">
                        <i class="fas fa-link mr-1"></i> Blockchain Secured
                    </span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Admission Number</label>
                    <input type="text" id="loginVoterId" placeholder="e.g., IUEA-2025-1234" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000] focus:border-[#8B0000]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000] focus:border-[#8B0000]">
                </div>
                <div class="text-right">
                    <a href="forgot-password.html" class="text-sm text-[#8B0000] hover:underline">Forgot Password?</a>
                </div>
                <button id="loginBtn" class="w-full btn-maroon text-white py-2 rounded-lg font-semibold">Login</button>
                
                <div class="text-center mt-4">
                    <p class="text-sm text-gray-500">Don't have an account? <a href="register.html" class="text-[#8B0000] hover:underline">Register here</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
            <p class="text-gray-500 text-sm">&copy; 2026 International University of East Africa. All rights reserved. | Learning to Succeed</p>
        </div>
    </footer>

    <script>
        const API_BASE = '/api';
        
        async function login() {
            const voter_id = document.getElementById('loginVoterId').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!voter_id || !password) {
                alert('Please enter both admission number and password');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voter_id, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials');
                }
                
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('voter_name', data.voter.full_name);
                localStorage.setItem('voter_id', data.voter.voter_id);
                localStorage.setItem('voter_email', data.voter.email);
                
                // Redirect to About page first (as requested)
                window.location.href = 'about.html';
                
            } catch (error) {
                alert(error.message);
            }
        }
        
        document.getElementById('loginBtn').addEventListener('click', login);
        
        // If already logged in, go to About page
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'about.html';
        }
    </script>
</body>

</html>
