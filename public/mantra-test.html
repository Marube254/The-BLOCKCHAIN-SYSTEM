<!DOCTYPE html>
<html>
<head>
    <title>Mantra MFS100 Hardware Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { background: #8B0000; color: white; padding: 10px 20px; margin: 5px; border: none; cursor: pointer; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h2>Mantra MFS100 Hardware Test</h2>
    <p>Serial: 6653067 | Model: MFS100</p>
    
    <div id="status" class="status info">Ready to test Mantra hardware...</div>
    
    <button onclick="testActiveX()">1. Test ActiveX Connection</button>
    <button onclick="captureFingerprint()">2. Capture Fingerprint</button>
    
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        let mantraDevice = null;
        
        function updateStatus(msg, type) {
            const el = document.getElementById('status');
            el.className = `status ${type}`;
            el.innerHTML = msg;
        }
        
        function addResult(msg, type) {
            const el = document.getElementById('result');
            const className = type === 'success' ? 'success' : (type === 'error' ? 'error' : 'info');
            el.innerHTML += `<div class="${className}" style="margin-top: 5px; padding: 5px;">${msg}</div>`;
        }
        
        function testActiveX() {
            updateStatus('Testing ActiveX connection...', 'info');
            
            try {
                mantraDevice = new ActiveXObject("MFS100.MFS100Ctrl.1");
                mantraDevice.InitEngine();
                
                updateStatus('✅ Mantra MFS100 detected!', 'success');
                addResult('✅ Mantra MFS100 hardware is connected and working', 'success');
                return true;
            } catch(e) {
                updateStatus('❌ Mantra not detected', 'error');
                addResult('❌ Error: ' + e.message, 'error');
                return false;
            }
        }
        
        function captureFingerprint() {
            if (!mantraDevice) {
                addResult('❌ Please test ActiveX connection first', 'error');
                return;
            }
            
            updateStatus('Place finger on scanner...', 'info');
            addResult('🖐️ Place your finger on the Mantra scanner', 'info');
            
            let quality = 0;
            let attempts = 0;
            
            const interval = setInterval(() => {
                try {
                    quality = mantraDevice.GetQuality();
                    attempts++;
                    
                    if (quality >= 40) {
                        clearInterval(interval);
                        const template = mantraDevice.GetTemplate();
                        updateStatus(`✅ Captured! Quality: ${quality}%`, 'success');
                        addResult(`✅ Fingerprint captured! Quality: ${quality}%`, 'success');
                    } else if (attempts >= 20) {
                        clearInterval(interval);
                        updateStatus(`❌ Failed. Quality: ${quality}%`, 'error');
                    }
                } catch(e) {
                    clearInterval(interval);
                    addResult('❌ Error: ' + e.message, 'error');
                }
            }, 500);
        }
    </script>
</body>
</html>
