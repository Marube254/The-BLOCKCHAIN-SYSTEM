<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - IUEA Blockchain Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .bg-maroon { background-color: #8B0000; }
        .btn-maroon { background-color: #8B0000; transition: all 0.3s ease; }
        .btn-maroon:hover { background-color: #6a0000; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-md p-8">
            <div class="text-center mb-8">
                <img src="images/iuea-logo.png" alt="IUEA Logo" class="h-24 mx-auto mb-4">
                <div class="flex justify-center mt-2">
                    <span class="bg-[#8B0000]/10 text-[#8B0000] text-xs px-3 py-1 rounded-full">
                        <i class="fas fa-link mr-1"></i> Blockchain Secured
                    </span>
                </div>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" id="regFirstName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000]">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" id="regLastName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000]">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Admission Number</label>
                    <input type="text" id="regVoterId" placeholder="e.g., IUEA-2025-1234" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="regEmail" placeholder="student@iuea.ac.ug" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000]">
                </div>
                <button id="registerBtn" class="w-full btn-maroon text-white py-2 rounded-lg font-semibold mt-4">Create Account</button>
                
                <div class="text-center mt-4">
                    <p class="text-sm text-gray-500">Already have an account? <a href="login.html" class="text-[#8B0000] hover:underline">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-wrap justify-center gap-x-8 gap-y-3 mb-6">
                <a href="privacy.html" class="text-gray-400 hover:text-[#8B0000] text-sm transition">Privacy Policy</a>
                <a href="terms.html" class="text-gray-400 hover:text-[#8B0000] text-sm transition">Terms of Service</a>
                <a href="blockchain.html" class="text-gray-400 hover:text-[#8B0000] text-sm transition">Blockchain Verification</a>
                <a href="faq.html" class="text-gray-400 hover:text-[#8B0000] text-sm transition">FAQ</a>
                <a href="contact.html" class="text-gray-400 hover:text-[#8B0000] text-sm transition">Contact</a>
            </div>
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 pt-4 border-t border-gray-700">
                <div class="flex items-center gap-3">
                    <img src="images/iuea-logo.png" alt="IUEA Logo" class="h-8 w-auto">
                    <span class="text-gray-500 text-xs">| Learning to Succeed</span>
                </div>
                <div class="text-center">
                    <p class="text-gray-500 text-xs">Created by <span class="text-[#8B0000]">Marube</span></p>
                    <p class="text-gray-600 text-xs mt-1">&copy; 2026 International University of East Africa. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = '/api';
        
        async function register() {
            const first_name = document.getElementById('regFirstName').value;
            const last_name = document.getElementById('regLastName').value;
            const voter_id = document.getElementById('regVoterId').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const password_confirmation = document.getElementById('regConfirmPassword').value;
            
            if (!first_name || !last_name || !voter_id || !email || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (password !== password_confirmation) {
                alert('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ first_name, last_name, voter_id, email, password, password_confirmation })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Registration failed');
                }
                
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
                
            } catch (error) {
                alert(error.message);
            }
        }
        
        document.getElementById('registerBtn').addEventListener('click', register);
        
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'about.html';
        }
    </script>
</body>
</html>
