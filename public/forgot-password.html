<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - IUEA Blockchain Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .bg-maroon { background-color: #8B0000; }
        .btn-maroon { background-color: #8B0000; transition: all 0.3s ease; }
        .btn-maroon:hover { background-color: #6a0000; transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Forgot Password Form -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-md p-8">
            <div class="text-center mb-8">
                <img src="images/iuea-logo.png" alt="IUEA Logo" class="h-24 mx-auto mb-4">
                <div class="flex justify-center mt-2">
                    <span class="bg-[#8B0000]/10 text-[#8B0000] text-xs px-3 py-1 rounded-full">
                        <i class="fas fa-link mr-1"></i> Blockchain Secured
                    </span>
                </div>
            </div>

            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Forgot Your Password?</h2>
                <p class="text-gray-600">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email address"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8B0000] focus:border-[#8B0000]">
                </div>
                <button id="resetBtn" class="w-full btn-maroon text-white py-2 rounded-lg font-semibold">
                    <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
                </button>

                <div class="text-center mt-4">
                    <p class="text-sm text-gray-500">
                        Remember your password?
                        <a href="login.html" class="text-[#8B0000] hover:underline">Login here</a>
                    </p>
                </div>
                <div class="text-center">
                    <p class="text-sm text-gray-500">
                        Don't have an account?
                        <a href="register.html" class="text-[#8B0000] hover:underline">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Initialize EmailJS
        emailjs.init("AKON5I-qdSpvPbsaj");

        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value;

            if (!email) {
                alert('Please enter your email address');
                return;
            }

            // Show loading state
            const resetBtn = document.getElementById('resetBtn');
            const originalText = resetBtn.innerHTML;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';
            resetBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.message);

                // Send email via EmailJS
                await emailjs.send('service_uixgfye', 'password_reset', {
                    to_email: email,
                    to_name: email.split('@')[0],
                    reset_link: data.reset_link,
                    message: `Click here to reset your password: ${data.reset_link}`
                });

                alert('Password reset link sent to your email!');

                // Redirect to login after success
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Reset link error:', error);
                alert('Failed to send reset link: ' + error.message);
            } finally {
                // Reset button state
                resetBtn.innerHTML = originalText;
                resetBtn.disabled = false;
            }
        }

        document.getElementById('resetBtn').addEventListener('click', sendResetLink);

        // Allow Enter key to submit
        document.getElementById('resetEmail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendResetLink();
            }
        });
    </script>
</body>
</html>
